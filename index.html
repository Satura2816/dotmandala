<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Mandala Artistry</title>

  <style>
    /* ================== */
    /* GLOBAL STYLES */
    /* ================== */
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background-color: #fffaf6;
      color: #4e342e;
      line-height: 1.7;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ================== */
    /* HEADER */
    /* ================== */
    header {
      text-align: center;
      background-color: #ffddd2;
      padding: 20px 0;
    }

    header h1 {
      margin: 0;
      color: #6b3e26;
      font-size: 2rem;
      font-weight: bold;
    }

    /* ================== */
    /* NAVIGATION */
    /* ================== */
    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
      background-color: #f4c9b1;
      padding: 15px 0;
    }

    nav a {
      font-size: 1.1rem;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    nav a:hover {
      background-color: #ffddd2;
    }

    /* ================== */
    /* MANDALA SECTION */
    /* ================== */
    .mandala-section {
      text-align: center;
      margin: 32px auto;
    }

    .mandala-wrapper {
      width: 200px;
      margin: auto;
      animation: spin 25s linear infinite;
    }

    .mandala-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .mandala-title {
      margin-top: 16px;
      font-size: 1.3rem;
      font-weight: bold;
      color: #7e4e3d;
    }

    /* ================== */
    /* CONTENT & GALLERY */
    /* ================== */
    .content {
      padding: 24px;
      text-align: center;
      max-width: 1200px;
      margin: auto;
    }

    .content h2 {
      color: #6b3e26;
      margin-bottom: 8px;
    }

    .content p {
      color: #7e4e3d;
      margin-bottom: 24px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .gallery-item {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.25s ease;
    }

    .gallery-item:hover {
      transform: translateY(-4px);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
    }

    .details {
      padding: 12px;
      text-align: center;
    }

    .details h3 {
      margin: 0;
      font-size: 1.05rem;
      color: #7e4e3d;
      font-weight: normal;
    }

    /* ================== */
    /* RESPONSIVE */
    /* ================== */

    @media (max-width: 1024px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      nav {
        gap: 20px;
      }
    }

    @media (max-width: 480px) {

      header h1 {
        font-size: 1.5rem;
      }

      nav {
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 10px 5px;
      }

      nav a {
        font-size: 0.95rem;
        padding: 6px 8px;
      }

      .mandala-wrapper {
        width: 160px;
      }

      .mandala-title {
        font-size: 1.2rem;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .gallery-item {
        width: 95%;
        max-width: 360px;
        margin: auto;
      }

      .details h3 {
        font-size: 0.95rem;
      }
    }

  </style>
</head>

<body>

  <header>
    <h1>Mandala Artistry</h1>
  </header>

  <nav>
    <a href="index.html">Gallery</a>
    <a href="product.html">Product</a>
    <a href="review.html">Review</a>
    <a href="info.html">About</a>
  </nav>

  <div class="mandala-section">
    <div class="mandala-wrapper">
      <img src="mandl.png" alt="Mandala">
    </div>
    <div class="mandala-title">Where Patterns Meet Peace</div>
  </div>

  <div class="content">
    <h2>Gallery</h2>
    <p>Explore our beautiful mandala artworks</p>

    <div class="gallery-grid">
      <div class="gallery-item">
        <img src="M2.jpg">
        <div class="details"><h3>Arcylic Red Mandala</h3></div>
      </div>
      <div class="gallery-item">
        <img src="M3.jpg">
        <div class="details"><h3>Arcylic Blue Mandala</h3></div>
      </div>
      <div class="gallery-item">
        <img src="M1.jpg">
        <div class="details"><h3>Arcylic Green Mandala</h3></div>
      </div>
      <div class="gallery-item">
        <img src="M4.jpg">
        <div class="details"><h3>Arcylic Light Mandala</h3></div>
      </div>
    </div>
  </div>

</body>
</html>
